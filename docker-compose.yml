version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: loan-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: loan-frontend
    ports:
      - "7860:7860"
    volumes:
      - .:/app
    depends_on:
      - api
    restart: always